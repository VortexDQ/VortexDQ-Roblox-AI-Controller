  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f3ae25fa-9cc8-4488-b38e-5b585f626b92\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n\n  <script>\n    window.addEventListener('unhandledrejection',function(e){e.preventDefault();});\n    window.onerror=function(m,s,l,c,e){if(!e||!(e instanceof Error))return true;return false;};\n  <\u002Fscript>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body { overflow: hidden; background: #0c1929; }\n    ::-webkit-scrollbar { width: 4px; }\n    ::-webkit-scrollbar-track { background: transparent; }\n    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }\n    ::-webkit-scrollbar-thumb:hover { background: #444; }\n    textarea:focus, input:focus { outline: none; }\n    @keyframes spin { to { transform: rotate(360deg); } }\n    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; height:100vh; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:#0c1929; color:#ececec;\">\n\n  <!-- ════ SIDEBAR ════ -->\n  <aside style=\"width:258px; min-width:258px; background:#0c1929; display:flex; flex-direction:column; border-right:1px solid rgba(100,200,220,0.07); height:100vh; overflow:hidden;\">\n\n    <!-- Logo row -->\n    <div style=\"padding:18px 14px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;\">\n      <div style=\"display:flex; align-items:center; gap:9px;\">\n        \n        <span style=\"font-size:15px; font-weight:600; letter-spacing:-0.01em; color:#ececec;\">VortexDQ<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- New chat -->\n    <div style=\"padding:2px 8px 10px; flex-shrink:0;\">\n      <button onclick=\"{{ newChat }}\" style=\"width:100%; display:flex; align-items:center; gap:9px; padding:8px 12px; background:rgba(100,200,220,0.06); border:1px solid rgba(100,200,220,0.09); border-radius:8px; color:#bbb; cursor:pointer; font-size:13px; font-weight:500; font-family:inherit;\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" fill=\"none\">\n          <path d=\"M6.5 1v11M1 6.5h11\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        New chat\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Nav items -->\n    <nav style=\"padding:0 8px 6px; display:flex; flex-direction:column; gap:1px; flex-shrink:0;\">\n      <button onclick=\"{{ newChat }}\" style=\"{{ navChatStyle }}\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M12 8.5a1 1 0 0 1-1 1H4.5l-2.5 2.5V3a1 1 0 0 1 1-1H11a1 1 0 0 1 1 1v5.5z\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        Chats\n      <\u002Fbutton>\n      <button onclick=\"{{ setViewModels }}\" style=\"{{ navModelsStyle }}\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"10\" height=\"10\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Frect><path d=\"M5 2v10M9 2v10M2 5h10M2 9h10\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fpath><\u002Fsvg>\n        Models\n      <\u002Fbutton>\n      <button onclick=\"{{ setViewErrors }}\" style=\"{{ navErrorsStyle }}\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 1.5l5.8 10H1.2L7 1.5z\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M7 5.5v3M7 9.8v.2\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        Errors\n        <sc-if value=\"{{ hasErrorBadge }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"margin-left:auto; background:#f87171; color:#              <sc-if value=\"{{ msg.isAI }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"{{ aiMsgRowStyle }}\">\n                    <div style=\"width:28px; height:28px; min-width:28px; border-radius:50%; background:rgba(12,143,160,0.1); border:1px solid rgba(12,143,160,0.22); display:flex; align-items:center; justify-content:center; margin-top:2px; flex-shrink:0;\">\n                      <div style=\"width:6px; height:6px; border-radius:50%; background:#0c8fa0;\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1; min-width:0; padding-top:2px;\">\n                      <div style=\"{{ msg.contentStyle }}\">{{ msg.content }}<\u002Fdiv>\n                      <sc-if value=\"{{ msg.hasMeta }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:11px; color:#3d3d3d; margin-top:7px; font-family:monospace; letter-spacing:0.02em;\">{{ msg.meta }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; gap:12px;\">\n                <div style=\"width:28px; height:28px; min-width:28px; border-radius:50%; background:rgba(12,143,160,0.1); border:1px solid rgba(12,143,160,0.22); display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n                  <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" fill=\"none\" style=\"{{ spinStyle }}\">\n                    <path d=\"M5.5 1v9M1 5.5h9M2.1 2.1l6.8 6.8M8.9 2.1L2.1 8.9\" stroke=\"#0c8fa0\" stroke-width=\"1.1\" stroke-linecap=\"round\"><\u002Fpath>\n                  <\u002Fsvg>\n                <\u002Fdiv>\n                <div style=\"padding-top:6px; color:#444; font-size:14px; font-style:italic;\">Generating...<\u002Fdiv>\n              <\u gin-bottom:24px; line-height:1.5;\">Select the AI model powering your Roblox game generation.<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <sc-for list=\"{{ models }}\" as=\"model\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ model.onClick }}\" style=\"{{ model.cardStyle }}\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                  <div>\n                    <div style=\"font-size:14px; font-weight:600; color:#ececec; margin-bottom:4px;\">{{ model.name }}<\u002Fdiv>\n                    <div style=\"font-size:12px; color:#484848;\">{{ model.cost }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ model.active }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"width:8px; height:8px; border-radius:50%; background:#0c8fa0; flex-shrink:0;\"><\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ noModels }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:40px 20px; color:#3d3d3d; font-size:14px;\">No models available — check server connection and API keys<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── ERRORS PANEL ── -->\n    <sc-if value=\"{{ isErrors }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; overflow-y:auto; padding:32px;\">\n        <div style=\"max-width:580px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;\">\n            <h2 style=\"font-size:19px; font-weight:600; color:#ececec;\">Error Tracking<\u002Fh2>\n            <button onclick=\"{{ exportErrors }}\" style=\"padding:7px 14px; background:rgba(100,200,220,0.05); border:1px solid rgba(100,200,220,0.09); border-radius:8px; color:#777; font-size:12px; cursor:pointer; font-family:inherit; font-weight:500;\">Export CSV<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasErrors }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:18px;\">\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px; text-align:center;\">\n                <div style=\"font-size:30px; font-weight:700; color:#ececec; line-height:1; margin-bottom:6px;\">{{ errorsDisplay.total }}<\u002Fdiv>\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.06em;\">Total<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px; text-align:center;\">\n                <div style=\"font-size:30px; font-weight:700; color:#4ade80; line-height:1; margin-bottom:6px;\">{{ errorsDisplay.fixed }}<\u002Fdiv>\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.06em;\">Fixed<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px; text-align:center;\">\n                <div style=\"font-size:30px; font-weight:700; color:#f87171; line-height:1; margin-bottom:6px;\">{{ errorsDisplay.unfixed }}<\u002Fdiv>\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.06em;\">Unfixed<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px;\">\n              <div style=\"font-size:13px; font-weight:600; color:#ccc; margin-bottom:16px;\">By Severity<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:12px;\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13px;\">\n                  <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#f87171; display:inline-block; flex-shrink:0;\"><\u002Fspan><span style=\"color:#777;\">Critical<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-weight:600; color:#ececec; font-variant-numeric:tabular-nums;\">{{ errorsDisplay.critical }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13px;\">\n                  <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#fb923c; display:inline-block; flex-shrink:0;\"><\u002Fspan><span style=\"color:#777;\">High<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-weight:600; color:#ececec; font-variant-numeric:tabular-nums;\">{{ errorsDisplay.high }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13px;\">\n                  <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#fbbf24; display:inline-block; flex-shrink:0;\"><\u002Fspan><span style=\"color:#777;\">Medium<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-weight:600; color:#ececec; font-variant-numeric:tabular-nums;\">{{ errorsDisplay.medium }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13px;\">\n                  <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#60a5fa; display:inline-block; flex-shrink:0;\"><\u002Fspan><span style=\"color:#777;\">Low<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-weight:600; color:#ececec; font-variant-numeric:tabular-nums;\">{{ errorsDisplay.low }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noErrors }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:48px 20px; color:#3d3d3d; font-size:14px;\">No error data — connect to your server to start tracking<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── STATS PANEL ── -->\n    <sc-if value=\"{{ isStats }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; overflow-y:auto; padding:32px;\">\n        <div style=\"max-width:580px;\">\n          <h2 style=\"font-size:19px; font-weight:600; color:#ececec; margin-bottom:24px;\">Performance Stats<\u002Fh2>\n          <sc-if value=\"{{ hasStats }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:22px;\">\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;\">Executions<\u002Fdiv>\n                <div style=\"font-size:34px; font-weight:700; color:#ececec; line-height:1; font-variant-numeric:tabular-nums;\">{{ statsDisplay.totalExecutions }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:22px;\">\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;\">Success Rate<\u002Fdiv>\n                <div style=\"font-size:34px; font-weight:700; color:#4ade80; line-height:1;\">{{ statsDisplay.successRate }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:22px;\">\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;\">Avg Duration<\u002Fdiv>\n                <div style=\"font-size:34px; font-weight:700; color:#ececec; line-height:1;\">{{ statsDisplay.avgDuration }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:22px;\">\n                <div style=\"font-size:11px; color:#484848; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;\">Connections<\u002Fdiv>\n                <div style=\"font-size:34px; font-weight:700; color:#ececec; line-height:1;\">{{ statsDisplay.connections }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noStats }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:48px 20px; color:#3d3d3d; font-size:14px;\">No stats yet — connect to your server to begin tracking<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── PLUGIN PANEL ── -->\n    <sc-if value=\"{{ isPlugin }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; overflow-y:auto; padding:32px;\">\n        <div style=\"max-width:580px;\">\n          <h2 style=\"font-size:19px; font-weight:600; color:#ececec; margin-bottom:24px;\">Roblox Studio Plugin<\u002Fh2>\n\n          <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px; margin-bottom:14px; display:flex; align-items:center; gap:14px;\">\n            <div style=\"{{ bigPluginDotStyle }}\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size:14px; font-weight:600; color:#ececec; margin-bottom:3px;\">{{ pluginStatusLabel }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:#555; line-height:1.4;\">{{ pluginStatusDesc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasConnections }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:16px; margin-bottom:14px;\">\n              <div style=\"font-size:13px; font-weight:600; color:#ccc; margin-bottom:12px;\">Active Connections<\u002Fdiv>\n              <sc-for list=\"{{ connections }}\" as=\"conn\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(100,200,220,0.05);\">\n                  <span style=\"color:#888; font-family:monospace; font-size:12px;\">{{ conn.id }}<\u002Fspan>\n                  <span style=\"color:#3d3d3d; font-size:11px;\">{{ conn.lastUpdateStr }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:18px;\">\n            <div style=\"font-size:13px; font-weight:600; color:#ccc; margin-bottom:12px;\">Installation Guide<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px; font-size:13px; color:#666; line-height:1.5;\">\n              <div>1. Copy <code style=\"background:#09131e; padding:2px 6px; border-radius:4px; font-size:11px; color:#aaa; font-family:monospace;\">plugin/<\u002Fcode> files to your Roblox Plugins folder<\u002Fdiv>\n              <div>2. Windows: <code style=\"background:#09131e; padding:2px 6px; border-radius:4px; font-size:11px; color:#888; font-family:monospace;\">%APPDATA%\\Roblox\\Plugins\\<\u002Fcode><\u002Fdiv>\n              <div>3. Mac: <code style=\"background:#09131e; padding:2px 6px; border-radius:4px; font-size:11px; color:#888; font-family:monospace;\">~/Library/Application Support/Roblox/Plugins/<\u002Fcode><\u002Fdiv>\n              <div>4. Restart Studio → Plugins → <strong style=\"color:#888;\">VortexDQ AI<\u002Fstrong><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── SETTINGS PANEL ── -->\n    <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; overflow-y:auto; padding:32px;\">\n        <div style=\"max-width:500px;\">\n          <h2 style=\"font-size:19px; font-weight:600; color:#ececec; margin-bottom:5px;\">Settings<\u002Fh2>\n          <p style=\"color:#484848; font-size:13px; margin-bottom:24px; line-height:1.5;\">Enter API keys to enable AI models. Saved to your <code style=\"background:#162332; padding:1px 5px; border-radius:4px; font-size:11px; color:#888; font-family:monospace;\">.env<\u002Fcode> file.<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\">\n                <span style=\"font-size:13px; font-weight:600; color:#ccc;\">Anthropic (Claude)<\u002Fspan>\n                <span style=\"{{ anthropicStatusStyle }}\">{{ anthropicStatus }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"password\" value=\"{{ keyAnthropicVal }}\" onchange=\"{{ handleKeyAnthropicChange }}\" placeholder=\"sk-ant-api03-…\" style=\"width:100%; background:#09131e; border:1px solid rgba(100,200,220,0.09); border-radius:8px; padding:9px 12px; color:#ececec; font-size:13px; font-family:monospace; display:block;\">\n            <\u002Fdiv>\n            <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\">\n                <span style=\"font-size:13px; font-weight:600; color:#ccc;\">Google Gemini<\u002Fspan>\n                <span style=\"{{ geminiStatusStyle }}\">{{ geminiStatus }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"password\" value=\"{{ keyGeminiVal }}\" onchange=\"{{ handleKeyGeminiChange }}\" placeholder=\"AIza…\" style=\"width:100%; background:#09131e; border:1px solid rgba(100,200,220,0.09); border-radius:8px; padding:9px 12px; color:#ececec; font-size:13px; font-family:monospace; display:block;\">\n            <\u002Fdiv>\n            <div style=\"background:#162332; border:1px solid rgba(100,200,220,0.07); border-radius:12px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\">\n                <span style=\"font-size:13px; font-weight:600; color:#ccc;\">DeepSeek<\u002Fspan>\n                <span style=\"{{ deepseekStatusStyle }}\">{{ deepseekStatus }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"password\" value=\"{{ keyDeepseekVal }}\" onchange=\"{{ handleKeyDeepseekChange }}\" placeholder=\"sk-…\" style=\"width:100%; background:#09131e; border:1px solid rgba(100,200,220,0.09); border-radius:8px; padding:9px 12px; color:#ececec; font-size:13px; font-family:monospace; display:block;\">\n            <\u002Fdiv>\n            <button onclick=\"{{ saveSettings }}\" style=\"{{ saveBtnStyle }}\">{{ saveBtnText }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'chat',\n    messages: [],\n    sessions: [],\n    activeSessionId: null,\n    isLoading: false,\n    inputValue: '',\n    activeModel: 'claude',\n    models: [],\n    stats: null,\n    errors: null,\n    connections: [],\n    pluginConnected: false,\n    serverOnline: true,\n    apiConfig: { anthropic: false, gemini: false, deepseek: false },\n    keyAnthropicVal: '',\n    keyGeminiVal: '',\n    keyDeepseekVal: '',\n    settingsSaved: false,\n  };\n\n  componentDidMount() {\n    // Prevent caught-but-surfaced promise rejections from polluting the console\n    this._rejHandler = (e) => { e.preventDefault(); };\n    window.addEventListener('unhandledrejection', this._rejHandler);\n    this.loadSessions();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('unhandledrejection', this._rejHandler);\n    clearInterval(this._pollInterval);\n  }\n\n  apiBase() {\n    const loc = window.location;\n    if (loc.hostname === '127.0.0.1' || loc.hostname === 'localhost') return loc.origin;\n    return 'http://127.0.0.1:7777';\n  }\n\n  componentDidUpdate(_, prevState) {\n    if (prevState.messages.length !== this.state.messages.length) {\n      const el = document.querySelector('[data-messages]');\n      if (el) el.scrollTop = el.scrollHeight;\n    }\n  }\n\n  async api(path, opts = {}) {\n    const res = await fetch(this.apiBase() + path, {\n      headers: { 'Content-Type': 'application/json' },\n      ...opts,\n    });\n    if (!res.ok) throw new Error('HTTP ' + res.status);\n    return res.json();\n  }\n\n  async fetchModels() {\n    try {\n      const d = await this.api('/api/models');\n      this.setState({ models: d.available || [], activeModel: d.active || this.state.activeModel });\n    } catch(e) {}\n  }\n\n  async fetchStats() {\n    try {\n      const d = await this.api('/api/stats');\n      this.setState({ stats: d });\n    } catch(e) {}\n  }\n\n  async fetchErrors() {\n    try {\n      const d = await this.api('/api/errors');\n      this.setState({ errors: d });\n    } catch(e) {}\n  }\n\n  async fetchConnections() {\n    try {\n      const d = await this.api('/api/status');\n      const c = d.connections || [];\n      this.setState({ connections: c, pluginConnected: c.some(x => x.connected) });\n    } catch(e) {}\n  }\n\n  async fetchConfig() {\n    try {\n      const d = await this.api('/api/config');\n      this.setState({ apiConfig: d });\n    } catch(e) {}\n  }\n\n  loadSessions() {\n    try {\n      const raw = localStorage.getItem('vortex_ai_sessions');\n      const sessions = raw ? JSON.parse(raw) : [];\n      const activeId = localStorage.getItem('vortex_ai_active');\n      if (activeId) {\n        const active = sessions.find(s => s.id === activeId);\n        if (active) {\n          this.setState({ sessions, activeSessionId: activeId, messages: active.messages || [] });\n          return;\n        }\n      }\n      this.setState({ sessions });\n    } catch(e) {\n      this.setState({ sessions: [] });\n    }\n  }\n\n  saveSession(messages) {\n    const { sessions, activeSessionId } = this.state;\n    let id = activeSessionId;\n    let updated = [...sessions];\n    if (!id) {\n      id = Date.now().toString();\n      const first = messages.find(m => m.role === 'user');\n      const raw = first ? first.content : 'New chat';\n      const title = raw.length > 40 ? raw.slice(0, 40) + '…' : raw;\n      updated = [{ id, title, messages, ts: Date.now() }, ...updated].slice(0, 30);\n    } else {\n      updated = updated.map(s => s.id === id ? { ...s, messages } : s);\n    }\n    try {\n      localStorage.setItem('vortex_ai_sessions', JSON.stringify(updated));\n      localStorage.setItem('vortex_ai_active', id);\n    } catch(e) {}\n    this.setState({ sessions: updated, activeSessionId: id });\n  }\n\n  activateSession = (id) => {\n    const s = this.state.sessions.find(x => x.id === id);\n    if (!s) return;\n    try { localStorage.setItem('vortex_ai_active', id); } catch(e) {}\n    this.setState({ activeSessionId: id, messages: s.messages || [], view: 'chat' });\n  }\n\n  newChat = () => {\n    try { localStorage.removeItem('vortex_ai_active'); } catch(e) {}\n    this.setState({ activeSessionId: null, messages: [], view: 'chat', inputValue: '' });\n  }\n\n  setView = (v) => {\n    this.setState({ view: v });\n    // Lazy-load panel data and start polling on first navigation\n    if (!this._pollInterval) {\n      this._pollInterval = setInterval(() => {\n        const { view } = this.state;\n        if (view === 'models') this.fetchModels();\n        else if (view === 'errors') this.fetchErrors();\n        else if (view === 'stats') this.fetchStats();\n        else if (view === 'plugin') this.fetchConnections();\n      }, 4000);\n    }\n    if (v === 'models') this.fetchModels();\n    else if (v === 'errors') this.fetchErrors();\n    else if (v === 'stats') this.fetchStats();\n    else if (v === 'plugin') this.fetchConnections();\n    else if (v === 'settings') this.fetchConfig();\n  }\n\n  handleInputChange = (e) => this.setState({ inputValue: e.target.value });\n\n  handleKeyDown = (e) => {\n    if (e.key === 'Enter' && !e.shiftKey) {\n      e.preventDefault();\n      this.sendMessage();\n    }\n  }\n\n  sendMessage = async () => {\n    const { inputValue, activeModel, messages } = this.state;\n    const prompt = inputValue.trim();\n    if (!prompt || this.state.isLoading) return;\n\n    const userMsg = { role: 'user', content: prompt, ts: Date.now() };\n    const newMsgs = [...messages, userMsg];\n    this.setState({ messages: newMsgs, inputValue: '', isLoading: true });\n\n    try {\n      let content, meta, type;\n      const history = messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : m.role, content: m.content }));\n\n      if (prompt.startsWith('/analyze')) {\n        const d = await this.api('/api/analyze', { method: 'POST', body: JSON.stringify({ deep: prompt.includes('deep') }) });\n        const a = d.analysis || {};\n        const suggestions = (a.suggestions || []).map(s => '• ' + s.message).join('\\n');\n        content = 'Game Analysis\\n\\nInstances: ' + (a.stats && a.stats.totalInstances != null ? a.stats.totalInstances : '?') + '  ·  Complexity: ' + (a.stats ? a.stats.complexity || '?' : '?') + '\\n\\n' + suggestions;\n        type = 'success';\n      } else if (prompt.startsWith('/scan')) {\n        const d = await this.api('/api/scan', { method: 'POST', body: JSON.stringify({}) });\n        const r = d.report || {};\n        content = 'Security Scan: ' + (r.status || 'unknown').toUpperCase() + '\\n\\n' + (r.summary || 'No summary available.');\n        type = r.status === 'clean' ? 'success' : 'warning';\n      } else {\n        const d = await this.api('/api/execute', {\n          method: 'POST',\n          body: JSON.stringify({ prompt, model: activeModel, enhance: true, history })\n        });\n        if (!d.success) throw new Error(d.error || 'Execution failed');\n        const a = d.analysis || {};\n        content = d.message || ('Applied ' + (a.commandCount || 0) + ' commands successfully.');\n        const metaParts = [];\n        if (a.commandCount != null) metaParts.push(a.commandCount + ' cmd' + (a.commandCount !== 1 ? 's' : ''));\n        if (a.executionTime) metaParts.push(a.executionTime);\n        if (a.complexity) metaParts.push(a.complexity);\n        meta = metaParts.join(' · ');\n        type = 'success';\n      }\n\n      const aiMsg = { role: 'ai', content, meta, type, ts: Date.now() };\n      const finalMsgs = [...newMsgs, aiMsg];\n      this.setState({ messages: finalMsgs });\n      this.saveSession(finalMsgs);\n    } catch(e) {\n      const errMsg = { role: 'ai', content: 'Error: ' + e.message, type: 'error', ts: Date.now() };\n      const finalMsgs = [...newMsgs, errMsg];\n      this.setState({ messages: finalMsgs });\n      this.saveSession(finalMsgs);\n    } finally {\n      this.setState({ isLoading: false });\n    }\n  }\n\n  async switchModel(name) {\n    try {\n      await this.api('/api/models/set', { method: 'POST', body: JSON.stringify({ model: name }) });\n      this.setState({ activeModel: name });\n      this.fetchModels();\n    } catch(e) {}\n  }\n\n  exportErrors = async () => {\n    try {\n      const res = await fetch(this.apiBase() + '/api/errors/export?format=csv');\n      const csv = await res.text();\n      const blob = new Blob([csv], { type: 'text/csv' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = 'vortex-errors-' + Date.now() + '.csv';\n      a.click();\n      URL.revokeObjectURL(url);\n    } catch(e) {}\n  }\n\n  saveSettings = async () => {\n    const { keyAnthropicVal, keyGeminiVal, keyDeepseekVal } = this.state;\n    try {\n      await this.api('/api/config', {\n        method: 'POST',\n        body: JSON.stringify({ anthropicKey: keyAnthropicVal, geminiKey: keyGeminiVal, deepseekKey: keyDeepseekVal })\n      });\n      this.setState({ keyAnthropicVal: '', keyGeminiVal: '', keyDeepseekVal: '', settingsSaved: true });\n      await this.fetchConfig();\n      await this.fetchModels();\n      setTimeout(() => this.setState({ settingsSaved: false }), 2500);\n    } catch(e) {}\n  }\n\n  navStyle(id) {\n    const active = this.state.view === id || (id === 'chat' && this.state.view === 'chat');\n    return {\n      width: '100%',\n      display: 'flex',\n      alignItems: 'center',\n      gap: '9px',\n      padding: '7px 10px',\n      background: active ? 'rgba(100,200,220,0.07)' : 'transparent',\n      border: 'none',\n      borderRadius: '7px',\n      color: active ? '#ddd' : '#555',\n      cursor: 'pointer',\n      fontSize: '13px',\n      fontWeight: active ? '500' : '400',\n      fontFamily: 'inherit',\n      textAlign: 'left',\n    };\n  }\n\n  renderVals() {\n    const { view, messages, sessions, isLoading, inputValue, activeModel, models,\n            stats, errors, connections, pluginConnected, serverOnline,\n            apiConfig, keyAnthropicVal, keyGeminiVal, keyDeepseekVal, settingsSaved } = this.state;\n\n    const h = new Date().getHours();\n    const greeting = h >= 5 && h < 12 ? 'Good morning, VortexDQ'\n      : h >= 12 && h < 17 ? 'Good afternoon, VortexDQ'\n      : h >= 17 && h < 21 ? 'Good evening, VortexDQ'\n      : \"It's late-night VortexDQ\";\n\n    const showWelcome = view === 'chat' && messages.length === 0;\n    const showChat = view === 'chat' && messages.length > 0;\n\n    const sessionItems = sessions.map(s => ({\n      id: s.id,\n      title: s.title,\n      activate: () => this.activateSession(s.id),\n      itemStyle: {\n        width: '100%',\n        display: 'block',\n        padding: '6px 10px',\n        background: s.id === this.state.activeSessionId ? 'rgba(100,200,220,0.07)' : 'transparent',\n        border: 'none',\n        borderRadius: '6px',\n        color: s.id === this.state.activeSessionId ? '#ccc' : '#555',\n        cursor: 'pointer',\n        fontSize: '13px',\n        textAlign: 'left',\n        fontFamily: 'inherit',\n        overflow: 'hidden',\n        textOverflow: 'ellipsis',\n        whiteSpace: 'nowrap',\n      },\n    }));\n\n    const messageItems = messages.map(m => ({\n      ...m,\n      isUser: m.role === 'user',\n      isAI: m.role === 'ai',\n      hasMeta: !!m.meta,\n      contentStyle: {\n        fontSize: '14px',\n        lineHeight: '1.65',\n        color: m.type === 'error' ? '#f87171' : '#ccc',\n        whiteSpace: 'pre-wrap',\n        wordBreak: 'break-word',\n      },\n    }));\n\n    const modelItems = models.map(m => ({\n      ...m,\n      active: m.name === activeModel,\n      onClick: () => this.switchModel(m.name),\n      cardStyle: {\n        background: m.name === activeModel ? 'rgba(12,143,160,0.07)' : '#2a2a2a',\n        border: m.name === activeModel ? '1px solid rgba(12,143,160,0.28)' : '1px solid rgba(100,200,220,0.07)',\n        borderRadius: '12px',\n        padding: '16px',\n        cursor: 'pointer',\n      },\n    }));\n\n    const pluginDotBase = { width: '7px', height: '7px', borderRadius: '50%', background: pluginConnected ? '#4ade80' : '#18283a', flexShrink: 0 };\n    const footerPluginDotStyle = pluginDotBase;\n    const sidebarPluginDotStyle = { ...pluginDotBase, marginLeft: 'auto' };\n    const bigPluginDotStyle = { width: '12px', height: '12px', borderRadius: '50%', background: pluginConnected ? '#4ade80' : '#3a3a3a', flexShrink: 0 };\n    const pluginLabel = pluginConnected ? 'Plugin connected' : 'Plugin disconnected';\n    const pluginStatusLabel = pluginConnected ? 'Connected' : 'Disconnected';\n    const pluginStatusDesc = pluginConnected\n      ? (connections.length + ' plugin' + (connections.length !== 1 ? 's' : '') + ' active')\n      : 'Plugin not detected. Make sure Roblox Studio is running with the plugin installed.';\n\n    const connItems = connections.map(c => ({\n      ...c,\n      lastUpdateStr: c.lastUpdate ? new Date(c.lastUpdate).toLocaleTimeString() : '—',\n    }));\n\n    const errorsDisplay = {\n      total: errors && errors.totalErrors != null ? errors.totalErrors : 0,\n      fixed: errors && errors.fixedErrors != null ? errors.fixedErrors : 0,\n      unfixed: errors && errors.unfixedErrors != null ? errors.unfixedErrors : 0,\n      critical: errors && errors.bySeverity && errors.bySeverity.critical != null ? errors.bySeverity.critical : 0,\n      high: errors && errors.bySeverity && errors.bySeverity.high != null ? errors.bySeverity.high : 0,\n      medium: errors && errors.bySeverity && errors.bySeverity.medium != null ? errors.bySeverity.medium : 0,\n      low: errors && errors.bySeverity && errors.bySeverity.low != null ? errors.bySeverity.low : 0,\n    };\n\n    const statsDisplay = {\n      totalExecutions: stats && stats.smartExecutor && stats.smartExecutor.totalExecutions != null ? stats.smartExecutor.totalExecutions : 0,\n      successRate: stats && stats.smartExecutor && stats.smartExecutor.successRate ? stats.smartExecutor.successRate : '—',\n      avgDuration: stats && stats.smartExecutor && stats.smartExecutor.avgDuration ? stats.smartExecutor.avgDuration : '—',\n      connections: stats && stats.connections != null ? stats.connections : 0,\n    };\n\n    const mkStatus = (ok) => ({ color: ok ? '#4ade80' : '#3d3d3d', fontSize: '11px' });\n    const needsApiKey = !apiConfig.anthropic && !apiConfig.gemini && !apiConfig.deepseek;\n\n    const inputFilled = inputValue.trim().length > 0;\n    const sendBtnStyle = {\n      width: '32px', height: '32px',\n      background: inputFilled ? '#0c8fa0' : 'rgba(100,200,220,0.06)',\n      border: 'none', borderRadius: '8px',\n      color: inputFilled ? '#fff' : '#3d3d3d',\n      cursor: inputFilled ? 'pointer' : 'default',\n      display: 'flex', alignItems: 'center', justifyContent: 'center',\n      flexShrink: 0, transition: 'background 0.15s',\n    };\n    const qaStyle = {\n      padding: '7px 15px',\n      background: 'rgba(100,200,220,0.05)',\n      border: '1px solid rgba(100,200,220,0.09)',\n      borderRadius: '100px',\n      color: '#777',\n      fontSize: '12px',\n      cursor: 'pointer',\n      whiteSpace: 'nowrap',\n      fontFamily: 'inherit',\n    };\n    const saveBtnStyle = {\n      padding: '10px 20px',\n      background: settingsSaved ? 'rgba(12,143,160,0.12)' : 'rgba(12,143,160,0.12)',\n      border: '1px solid ' + (settingsSaved ? 'rgba(12,143,160,0.28)' : 'rgba(12,143,160,0.28)'),\n      borderRadius: '8px',\n      color: settingsSaved ? '#4ade80' : '#0c8fa0',\n      fontSize: '13px', fontWeight: '600',\n      cursor: 'pointer', fontFamily: 'inherit',\n      alignSelf: 'flex-start',\n    };\n\n    return {\n      greeting, showWelcome, showChat,\n      isModels: view === 'models',\n      isErrors: view === 'errors',\n      isStats: view === 'stats',\n      isPlugin: view === 'plugin',\n      isSettings: view === 'settings',\n      showOfflineBanner: !serverOnline,\n\n      navChatStyle: this.navStyle('chat'),\n      navModelsStyle: this.navStyle('models'),\n      navErrorsStyle: this.navStyle('errors'),\n      navStatsStyle: this.navStyle('stats'),\n      navPluginStyle: this.navStyle('plugin'),\n      navSettingsStyle: this.navStyle('settings'),\n\n      sessions: sessionItems,\n      messages: messageItems,\n      isLoading,\n      inputValue,\n      activeModel,\n      models: modelItems,\n      noModels: models.length === 0,\n\n      pluginConnected, pluginLabel, pluginStatusLabel, pluginStatusDesc,\n      footerPluginDotStyle, sidebarPluginDotStyle, bigPluginDotStyle,\n      connections: connItems,\n      hasConnections: connItems.length > 0,\n\n      errorsDisplay,\n      hasErrors: !!errorsDisplay,\n      noErrors: !errorsDisplay,\n      errorBadgeCount: errorsDisplay ? errorsDisplay.unfixed : 0,\n      hasErrorBadge: errorsDisplay ? errorsDisplay.unfixed > 0 : false,\n\n      statsDisplay,\n      hasStats: !!statsDisplay,\n      noStats: !statsDisplay,\n\n      apiConfig, needsApiKey,\n      anthropicStatus: apiConfig.anthropic ? '✓ configured' : '✕ not set',\n      geminiStatus: apiConfig.gemini ? '✓ configured' : '✕ not set',\n      deepseekStatus: apiConfig.deepseek ? '✓ configured' : '✕ not set',\n      anthropicStatusStyle: mkStatus(apiConfig.anthropic),\n      geminiStatusStyle: mkStatus(apiConfig.gemini),\n      deepseekStatusStyle: mkStatus(apiConfig.deepseek),\n      keyAnthropicVal, keyGeminiVal, keyDeepseekVal,\n      saveBtnText: settingsSaved ? '✓ Saved!' : 'Save API Keys',\n      saveBtnStyle,\n\n      sendBtnStyle, qaStyle,\n      avatarStyle: { width:'28px', height:'28px', borderRadius:'50%', background:'linear-gradient(135deg,#0c8fa0,#0a6f7e)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:'700', color:'#fff', flexShrink:0 },\n      spinStyle: { animation: 'spin 1.2s linear infinite' },\n      userMsgRowStyle: { display: 'flex', justifyContent: 'flex-end', animation: 'fadeUp 0.18s ease' },\n      aiMsgRowStyle: { display: 'flex', gap: '12px', animation: 'fadeUp 0.18s ease' },\n\n      newChat: this.newChat,\n      setViewModels: () => this.setView('models'),\n      setViewErrors: () => this.setView('errors'),\n      setViewStats: () => this.setView('stats'),\n      setViewPlugin: () => this.setView('plugin'),\n      setViewSettings: () => this.setView('settings'),\n      handleInputChange: this.handleInputChange,\n      handleKeyDown: this.handleKeyDown,\n      sendMessage: this.sendMessage,\n      exportErrors: this.exportErrors,\n      saveSettings: this.saveSettings,\n      handleKeyAnthropicChange: (e) => this.setState({ keyAnthropicVal: e.target.value }),\n      handleKeyGeminiChange: (e) => this.setState({ keyGeminiVal: e.target.value }),\n      handleKeyDeepseekChange: (e) => this.setState({ keyDeepseekVal: e.target.value }),\n      qaScript: () => this.setState({ inputValue: 'Write a Lua script that ', view: 'chat' }),\n      qaBuild: () => this.setState({ inputValue: 'Build a ', view: 'chat' }),\n      qaFix: () => this.setState({ inputValue: 'Fix the error: ', view: 'chat' }),\n      qaAnalyze: () => this.setState({ inputValue: '/analyze', view: 'chat' }),\n      qaScan: () => this.setState({ inputValue: '/scan', view: 'chat' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
